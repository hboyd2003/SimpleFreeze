simplefreeze.version=$version
simplefreeze.name=Simple Freeze
simplefreeze.hover_display=<lang:simplefreeze.name>\n<lang:simplefreeze.version>
simplefreeze.display_name=<hover:show_text:\'<lang:simplefreeze.hover_display>\'><color:#b9eff3>Simple</color><color:#49b4b9>Freeze</color></hover>
simplefreeze.display_prefix=[<lang:simplefreeze.display_name>]
simplefreeze.command.freeze.froze_player=<lang:simplefreeze.display_prefix> Froze <yellow><player_name></yellow>
simplefreeze.command.freeze.froze_players=<lang:simplefreeze.display_prefix> Froze <yellow><player_count></yellow> players
simplefreeze.error.already_frozen=<lang:simplefreeze.display_prefix> No unfrozen player found
simplefreeze.command.unfreeze.unfroze_player.full=<lang:simplefreeze.display_prefix> Unfroze <yellow><player_name></yellow>
simplefreeze.command.unfreeze.unfroze_player.single=<lang:simplefreeze.display_prefix> Removed command freeze entry but <yellow><yellow><player_name></yellow></yellow> is still frozen by <yellow><freeze_entry_key></yellow>
simplefreeze.command.unfreeze.unfroze_player.multiple=<lang:simplefreeze.display_prefix> Removed command freeze entry but <yellow><player_name></yellow> is still frozen by <yellow><freeze_entry_count></yellow> other freeze entries
simplefreeze.command.unfreeze.unfroze_players.full=<lang:simplefreeze.display_prefix> Unfroze <yellow><player_count></yellow> players
simplefreeze.command.unfreeze.unfroze_players.single=<lang:simplefreeze.display_prefix> Removed command freeze entry from <yellow><player_count></yellow> players, but they are still frozen by <yellow><freeze_entry_key></yellow>
simplefreeze.command.unfreeze.unfroze_players.multiple=<lang:simplefreeze.display_prefix> Removed command freeze entry from <yellow><player_count></yellow> players, but they are still frozen by <yellow><freeze_entry_count></yellow> other freeze entries
simplefreeze.command.unfreeze.unfroze_players.ambiguous=<lang:simplefreeze.display_prefix> Unfroze<hover:show_text:Some players are still be frozen by other freeze entries>🛈</hover> <yellow><player_count></yellow>
simplefreeze.error.not_frozen=<lang:simplefreeze.display_prefix> No <hover:show_text:"Players may be frozen by multiple sources at once">command frozen🛈</hover> player found
simplefreeze.command.unfreeze.force.unfroze_player=<lang:simplefreeze.display_prefix> Forcibly unfroze <yellow><player_name></yellow>
simplefreeze.command.unfreeze.force.unfroze_players=<lang:simplefreeze.display_prefix> Forcibly unfroze <yellow><player_count></yellow> players
simplefreeze.command.simplefreeze.list.frozen_by=Frozen by <plugin_name>
simplefreeze.command.simplefreeze.list.frozen_by_count=Frozen by <plugin_count> plugins
simplefreeze.command.simplefreeze.list.error.no_frozen_players=<lang:simplefreeze.display_prefix> There are no players currently frozen!
simplefreeze.command.simplefreeze.version=<lang:simplefreeze.display_prefix> Version: <version>
simplefreeze.command.simplefreeze.status.header=<lang:simplefreeze.displayName> Status
simplefreeze.command.simplefreeze.status.total=Frozen Players: <yellow><player_count></yellow>
simplefreeze.command.simplefreeze.status.uniqueKeys=Unique Entry Keys: <yellow><freeze_entry_count></yellow>
simplefreeze.command.simplefreeze.status.player.header=<yellow><player_name></yellow> Frozen Status
simplefreeze.command.simplefreeze.status.player.lastEntry=Most recent entry: <yellow><freeze_entry></yellow>
simplefreeze.command.simplefreeze.status.player.frozenSince=Frozen Since: <yellow><frozen_timestamp></yellow>
simplefreeze.command.simplefreeze.status.player.totalentries=Total Entries: <yellow><freeze_entry_count></yellow>
simplefreeze.command.simplefreeze.status.player.entries=Entries: <freeze_entries>
